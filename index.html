<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AutoZap</title>
    <link rel="preload" as="image" href="autozap-logo-mobile-96.png">
    <script>
      (() => {
        const isMobile = window.matchMedia("(max-width: 853px)").matches;
        const target = isMobile ? "mobile.html" : "desktop.html";
        window.location.replace(target + window.location.search);
      })();
    </script>
    <meta name="description" content="AutoZap: IA, gestão e marketing para lojas de celulares.">
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #f5f9ff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #07133f;
      }

      body {
        display: grid;
        place-items: center;
      }

      .loader {
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 24px;
        text-align: center;
      }

      .loader img {
        width: 160px;
        height: auto;
      }

      .loader strong {
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <main class="loader" aria-live="polite">
      <img src="autozap-logo-mobile-96.png" alt="AutoZap" width="96" height="96">
      <strong>Carregando AutoZap...</strong>
      <noscript>
        <p>
          <a href="desktop.html">Abrir versão desktop</a> |
          <a href="mobile.html">Abrir versão mobile</a>
        </p>
      </noscript>
    </main>
  </body>
</html>
